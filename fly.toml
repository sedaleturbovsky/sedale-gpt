# fly.toml app configuration file generated for sedale-gpt on 2026-05-14T17:02:33Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sedale-gpt'
primary_region = 'iad'

[build]

[env]
  PORT = '8080'
  PUBLIC_URL = 'https://sedale-gpt.fly.dev'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/.well-known/agent-card.json'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
