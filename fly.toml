app = "opengrants-sedale-gpt"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  PUBLIC_URL = "https://opengrants-sedale-gpt.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    grace_period = "10s"
    method = "GET"
    timeout = "5s"
    path = "/.well-known/agent-card.json"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
